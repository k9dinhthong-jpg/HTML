      <p id="trangthai-timkiem"></p>
      <ul id="ketqua-timkiem"></ul>
      <p id="thongbao-timkiem"></p>
    </section>
    <section>
      <h3>Chi tiết người dùng</h3>
      <p id="chitiet"></p>
    </section>
    <script src="/JS/main.js"></script>
