<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Hồ sơ đăng ký</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>ĐĂNG KÝ HỒ SƠ THÀNH VIÊN</h1>

    <form class="profile-form">
      <h3>Thông tin cá nhân</h3>

      <label>Họ và tên</label>
      <input type="text" required />

      <label>Ngày sinh</label>
      <input type="date" required />

      <label>Giới tính</label>
      <input type="radio" name="gender" /> Nam
      <input type="radio" name="gender" /> Nữ

      <label>Ảnh đại diện</label>
      <input type="file" />

      <h3>Thông tin liên hệ</h3>

      <label>Email</label>
      <input type="email" required />

      <label>Số điện thoại</label>
      <input type="tel" />

      <label>Địa chỉ</label>
      <textarea rows="3"></textarea>

      <h3>Thông tin tài khoản</h3>

      <label>Tên đăng nhập</label>
      <input type="text" required />

      <label>Mật khẩu</label>
      <input type="password" required />

      <label>Nhập lại mật khẩu</label>
      <input type="password" required />

      <label>Vai trò</label>
      <select>
        <option>User</option>
        <option>Admin</option>
        <option>Editor</option>
      </select>

      <h3>Sở thích</h3>

      <input type="checkbox" /> Thể thao <input type="checkbox" /> Âm nhạc
      <input type="checkbox" /> Du lịch <input type="checkbox" /> Công nghệ

      <br /><br />

      <input type="checkbox" required /> Tôi đồng ý với điều khoản

      <br /><br />

      <button type="submit">Đăng ký</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
