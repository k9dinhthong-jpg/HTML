<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý bán hàng</title>
  </head>
  <body>
    <header><h1>Quản lý bán hàng</h1></header>
    <main>
      <h3>Thêm sản phẩm</h3>
      <label for="ten">Tên Sản Phẩm:</label>

      <input type="text" name="ten" id="ten" /> <br />
      <label for="gia">Giá:</label>
      <input type="number" name="gia" id="gia" /> <br />
      <label for="soluong">Số lượng:</label>
      <input type="number" name="soluong" id="soluong" /> <br />
      <label for="loai">Loại Sản Phẩm: </label>
      <select name="loai" id="loai">
        <option value="nuoc">Nước</option>
        <option value="banhkeo">Bánh kẹo</option>
      </select>
      <br />
      <label for="trangthai">Trạng thái:</label>
      <label for="hinhanhsp">Hình ảnh sản phẩm:</label>
      <img src="" alt="" />
      <h3>Bảng giá sản phẩm</h3>
      <table>
        <thead>
          <tr>
            <th>Tên sản phẩm</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Loại sản phẩm</th>
            <th>Trạng thái</th>
            <th>Tổng tiền</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Coca</td>
            <td>10000</td>
            <td>20</td>
            <td>Nước</td>
            <td>Còn hàng</td>
            <td>200000</td>
            <td><button>Sửa</button> <button>Xóa</button></td>
          </tr>
        </tbody>
      </table>
    </main>
    <footer></footer>
  </body>
</html>
