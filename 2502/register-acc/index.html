<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Trang chủ - Đăng ký</title>
  </head>
  <body>
    <header><h1>REGISTER</h1></header>
    <main>
      <form class="register">
        <div>
          <div class="if">
            <label for="name">Full Name</label>
            <input type="text" name="name" id="name" required /> <br />
          </div>
          <div class="if">
            <label for="mail">Email</label>
            <input type="email" name="mail" id="mail" required /> <br />
          </div>
          <div class="if">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required />
            <br />
          </div>
          <div class="if">
            <label for="gioitinh"></label>
            <input type="radio" name="gioitinh" id="nam" required />
            <label for="nam">Nam</label>
            <input type="radio" name="gioitinh" id="nữ" required />
            <label for="nữ">Nữ</label> <br />
          </div>
        </div>
        <div><button>[ Create Account ]</button></div>
      </form>
    </main>
    <footer>
      <div class="login">
        <a href="login.html">Already have account? Login</a>
      </div>
    </footer>
  </body>
</html>
