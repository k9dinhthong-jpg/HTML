<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/style-shoppingcart.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Shopping Cart</title>
  </head>
  <body>
    <header>
      <div class="header-left"><p>World Peas</p></div>
      <div class="header-right">
        <a href="#">Shop</a>
        <a href="#">Newstand</a>
        <a href="#">Who we are</a>
        <a href="#">My profile</a>
        <a
          style="
            background-color: #426b1f;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
          "
          href="#"
          >Basket (3)</a
        >
      </div>
    </header>
    <main>
      <div class="main-header">
        <h1>Basket</h1>
        <span> 3 items</span>
      </div>
      <div class="main-body">
        <div class="main-body-left">
          <div class="item">
            <img
              src="assets/img-shoppingcart/d343320d53ff6db3442c23537fe73d0771cdb929.jpg"
            />
            <p>
              <span
                style="
                  font-family: inter;
                  font-size: 20px;
                  font-weight: 600;
                  padding: 15px;
                "
                >Heirloom Tomato</span
              >
              <span
                style="
                  font-family: inter;
                  font-size: 20px;
                  font-weight: 600;
                  padding: 0 15px;
                  color: #426b1f;
                "
                >$5.99 / lb</span
              >
              <input
                type="number"
                value="1"
                min="1"
                name="quantity"
                id="quantity"
              />
              <label style="margin-left: -35px; color: #e6e6e6" for="quantity"
                ><i class="fa-solid fa-pen"></i
              ></label>
            </p>
          </div>
          <div class="item">
            <img
              src="assets/img-shoppingcart/706c77bb200aaa186b03d756f101124f8f921a28.jpg"
            />
            <p>
              <span
                style="
                  font-family: inter;
                  font-size: 20px;
                  font-weight: 600;
                  padding: 15px;
                "
                >Organic ginger</span
              >
              <span
                style="
                  font-family: inter;
                  font-size: 20px;
                  font-weight: 600;
                  padding: 0 15px;
                  color: #426b1f;
                "
                >$12.99 / lb</span
              >
              <input
                type="number"
                value="0.5"
                min="0.5"
                name="quantity"
                id="quantity"
              />
              <label style="margin-left: -35px; color: #e6e6e6" for="quantity"
                ><i class="fa-solid fa-pen"></i
              ></label>
            </p>
          </div>
          <div class="item">
            <img
              src="assets/img-shoppingcart/8a615eb8356467b743fd267765421ebcf3f00ae7.jpg"
            />
            <p>
              <span
                style="
                  font-family: inter;
                  font-size: 20px;
                  font-weight: 600;
                  padding: 15px;
                "
                >Sweet onion</span
              >
              <span
                style="
                  font-family: inter;
                  font-size: 20px;
                  font-weight: 600;
                  padding: 0 15px;
                  color: #426b1f;
                "
                >$2.99 / lb</span
              >
              <input
                type="number"
                value="5"
                min="5"
                name="quantity"
                id="quantity"
              />
              <label style="margin-left: -35px; color: #e6e6e6" for="quantity"
                ><i class="fa-solid fa-pen"></i
              ></label>
            </p>
          </div>
        </div>
        <div class="main-body-right">
          <h3>Order summary</h3>
          <p><span>Subtotal</span> <span>$27.44</span></p>
          <p><span>Shipping</span> <span>$3.99</span></p>
          <p><span>Tax</span> <span>$2.00</span></p>
          <h4><span>Total</span> <span>$33.43</span></h4>
          <button type="submit">
            <span>Continue to payment</span
            ><i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
