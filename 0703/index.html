<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>LOGIN</title>
  </head>
  <body>
    <form id="login-form">
      <div class="login-box">
        <div class="login-header"><h1>Login Form</h1></div>
        <div class="login-body">
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input
              type="text"
              name="username"
              id="username"
              value=""
              placeholder="Email or Phone"
              required
            />
          </div>
          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Password"
              required
            />
          </div>
          <div class="forgot"><a href="">Forgot password?</a></div>
          <button class="click-Login" type="submit" class="login-buttion">
            Login
          </button>
          <div class="signup">
            Not a member? <a href="dangky.html">Sign up now</a>
          </div>
        </div>
      </div>
    </form>
    <script src="./assets/js/login.js"></script>
  </body>
</html>
