<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style-qlsv.css" />
    <title>Tài khoản</title>
  </head>
  <body>
    <main>
      <form id="qlsv_form">
        <div class="qlsv-box">
          <div class="qlsv-header"><h2>Quản lý SV</h2></div>
          <div class="qlsv-register">
            <p>
              <span>Tên sinh viên:</span>
              <input type="text" name="tensv" id="tensv" required />
            </p>
            <p>
              <span>Năm sinh:</span>
              <input type="date" name="namsinh" id="namsinh" required />
            </p>
            <p>
              <span>Giới tính:</span>
              <input type="radio" name="gioitinh" id="Nam" required /><label
                for="Nam"
                >Nam</label
              >
              <input type="radio" name="gioitinh" id="Nữ" required /><label
                for="Nữ"
                >Nữ</label
              >
            </p>
            <p class="class_monhoc" id="id_monhoc">
              <span>Môn học:</span>
              <input
                type="checkbox"
                name="monhoc"
                id="Toán"
                value="Toán"
              /><label for="Toán">Toán</label>
              <input type="checkbox" name="monhoc" id="Lý" value="Lý" /><label
                for="Lý"
                >Lý</label
              >
              <input type="checkbox" name="monhoc" id="Hóa" value="Hóa" /><label
                for="Hóa"
                >Hóa</label
              >
            </p>
            <button type="button" id="id_themmon">Thêm môn</button>
            <p>
              <span>Lớp:</span>
              <select
                name="lop"
                required
                name="name_lop"
                id="id_lop"
                class="id_lop"
              >
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
              <span
                ><button type="button" id="id_themlop">Thêm lớp</button></span
              >
            </p>
            <button type="submit" id="themsv">Thêm sinh viên</button>
          </div>
          <div>
            <table class="qlsv-table">
              <thead>
                <tr>
                  <th>Tên</th>
                  <th>Lớp</th>
                  <th>Năm sinh</th>
                  <th>Giới tính</th>
                  <th>Môn học</th>
                  <th>Cập nhật</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </form>
    </main>
    <script src="./assets/js/qlsv2.js"></script>
  </body>
</html>
