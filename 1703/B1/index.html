<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>STUDENT REGISTRANTION FORM</title>
  </head>
  <body>
    <section class="registration-form">
      <h2><u>STUDENT REGISTRATION FORM</u></h2>
      <form action="">
        <div class="name">
          <label for="first-name">FIRST NAME</label>
          <input type="text" id="first-name" name="first-name" required />
          <p>(max 30 characters) a-z and A-Z)</p>
        </div>
        <div class="name">
          <label for="last-name">LAST NAME</label>
          <input type="text" id="last-name" name="last-name" required />
          <p>(max 30 characters) a-z and A-Z)</p>
        </div>
        <div class="date-of-birth">
          <label for="date-of-birth">DATE OF BIRTH</label>
          <select name="day" id="day" required>
            <option value="">Day</option>
          </select>
          <select name="month" id="month" required>
            <option value="">Month</option>
          </select>
          <select name="year" id="year" required>
            <option value="">Year</option>
          </select>
        </div>
        <div class="email-id">
          <label for="email-id">EMAIL ID</label>
          <input type="email" id="email-id" name="email-id" required />
        </div>
        <div class="phone-number">
          <label for="mobile-number">MOBILE NUMBER</label>
          <input type="tel" id="mobile-number" name="phone-number" required />
          <p>(10 digits number)</p>
        </div>
        <div class="gender">
          <label for="">GENDER</label>
          <label for="male" class="gender-radio">Male</label>
          <input
            class="gender-radio"
            type="radio"
            name="gender"
            id="male"
            value="male"
          />
          <label for="female" class="gender-radio">Female</label>
          <input
            class="gender-radio"
            type="radio"
            name="gender"
            id="female"
            value="female"
          />
        </div>
        <div class="address">
          <label for="address">ADDRESS</label>
          <textarea id="address" name="address" rows="4" required></textarea>
        </div>
        <div class="button-option">
          <button type="submit">SUBMIT</button>
          <button type="reset">RESET</button>
        </div>
      </form>
    </section>
    <script src="./assets/js/main.js"></script>
  </body>
</html>
