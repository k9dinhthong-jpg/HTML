<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="box">
      <h3>Customer Information</h3>
      <div class="form-box1">
        <div>
          <label for="title">Title:</label>
          <select name="title" id="title">
            <option value="Mr">Mr</option>
            <option value="Mrs">Ms</option>
            <option value="Miss">Miss</option>
            <option value="Sir">Sir</option>
            <option value="Madam">Madam</option>
          </select>
        </div>
        <div>
          <label for="name">Fullname:</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Nguyễn Đình Thông "
          />
        </div>
        <div>
          <label for="address">Address:</label>
          <input
            type="text"
            id="address"
            name="address"
            placeholder="Tỉnh Phú Thọ"
          />
        </div>
        <div>
          <label for="phone">Phone number:</label>
          <input
            type="number"
            id="phone"
            name="phone"
            placeholder="0123456789"
          />
        </div>
        <div>
          <label for="email">Email: </label>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="k9dinhthong@gmail.com"
          />
        </div>
      </div>
    </div>
    <div class="box">
      <h3>Product</h3>
      <div class="form-box2">
        <div>
          <label for="name">Name</label>
          <select name="name" id="name">
            <option value="Windows PC">Windows PC</option>
            <option value="Surface Pro">Surface Pro</option>
            <option value="Microsoft Lumia">Microsoft Lumia</option>
            <option value="Zune">Zune</option>
            <option value="xBox">xBox</option>
            <option value="HoloLens">HoloLens</option>
          </select>
        </div>
        <div>
          <label for="Color">Color</label>
          <input type="color" name="Color" id="Color" />
        </div>
        <div>
          <label for="Quantity">Quantity</label>
          <input type="number" name="Quantity" id="Quantity" />
        </div>
      </div>
    </div>
    <div class="box">
      <div class="form-box3">
        <header>
          <input type="checkbox" name="accept" id="accept" /><label
            for="accept"
            class="label-header"
            >I accept the terms and conditions.</label
          >
          <button type="button" id="show">[ Show ]</button>
        </header>
