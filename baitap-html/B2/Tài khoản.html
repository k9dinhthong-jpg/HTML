      <form id="qlsv_form">
        <div class="qlsv-box">
          <div class="qlsv-header"><h2>Quản lý SV</h2></div>
          <div class="qlsv-register">
            <p>
              <span>Tên sinh viên:</span>
              <input type="text" name="tensv" id="tensv">
            </p>
            <p>
              <span>Năm sinh:</span>
              <input type="date" name="namsinh" id="namsinh">
            </p>
            <p>
              <span>Giới tính:</span>
              <input type="radio" name="gioitinh" id="Nam"><label for="Nam">Nam</label>
              <input type="radio" name="gioitinh" id="Nữ"><label for="Nữ">Nữ</label>
            </p>
            <p class="subject">
              <span>Môn học:</span>
              <input type="checkbox" name="monhoc" id="Toán" value="Toán"><label for="Toán">Toán</label>
              <input type="checkbox" name="monhoc" id="Lý" value="Lý"><label for="Lý">Lý</label>
              <input type="checkbox" name="monhoc" id="Hóa" value="Hóa"><label for="Hóa">Hóa</label>
            </p>
            <button>Thêm môn</button>
            <p>
              <span>Lớp:</span>
              <select name="lop">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
              <span><button>Thêm lớp</button></span>
            </p>
            <button type="submit">Thêm sinh viên</button>
          </div>
          <div>
            <table class="qlsv-table">
              <thead>
                <tr>
                  <th>Tên</th>
                  <th>Lớp</th>
                  <th>Năm sinh</th>
                  <th>Giới tính</th>
                  <th>Môn học</th>
                  <th>Cập nhật</th>
                </tr>
              </thead>
              <tbody>
                
                
                
              </tbody>
            </table>
          </div>
        </div>
      </form>
    </main>
