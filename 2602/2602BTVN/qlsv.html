<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-qlsv.css" />
    <title>Tài khoản</title>
  </head>
  <body>
    <main>
      <form id="qlsv_form">
        <div class="qlsv-box">
          <div class="qlsv-header"><h2>Quản lý SV</h2></div>
          <div class="qlsv-register">
            <p>
              <span>Tên sinh viên:</span>
              <input type="text" name="tensv" id="tensv" />
            </p>
            <p>
              <span>Năm sinh:</span>
              <input type="date" name="namsinh" id="namsinh" />
            </p>
            <p>
              <span>Giới tính:</span>
              <input type="radio" name="gioitinh" id="Nam" /><label for="Nam"
                >Nam</label
              >
              <input type="radio" name="gioitinh" id="Nữ" /><label for="Nữ"
                >Nữ</label
              >
            </p>
            <p>
              <span>Môn học:</span>
              <input type="checkbox" name="monhoc" id="toan" /><label for="toan"
                >Toán</label
              >
              <input type="checkbox" name="monhoc" id="ly" /><label for="ly"
                >Lý</label
              >
              <input type="checkbox" name="monhoc" id="hoa" /><label for="hoa"
                >Hóa</label
              >
              <button>Thêm môn</button>
            </p>
            <p>
              <span>Lớp:</span>
              <select name="lop">
                <option value="A">A</option>
                <option value="B">B</option>
              </select>
              <span><button>Thêm lớp</button></span>
            </p>
            <button type="submit">Thêm sinh viên</button>
          </div>
          <div>
            <table class="qlsv-table">
              <thead>
                <tr>
                  <th>Tên</th>
                  <th>Lớp</th>
                  <th>Năm sinh</th>
                  <th>Giới tính</th>
                  <th>Môn học</th>
                  <th>Cập nhật</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Nguyễn Văn A</td>
                  <td>A</td>
                  <td>20/10/2001</td>
                  <td>Nam</td>
                  <td>Toán</td>
                  <td><button>Sửa</button><button>Xóa</button></td>
                </tr>
                <tr>
                  <td>Nguyễn Văn B</td>
                  <td>B</td>
                  <td>21/04/2004</td>
                  <td>Nam</td>
                  <td>Lý</td>
                  <td><button>Sửa</button><button>Xóa</button></td>
                </tr>
                <tr>
                  <td>Nguyễn Văn C</td>
                  <td>C</td>
                  <td>10/05/1993</td>
                  <td>Nam</td>
                  <td>Hóa</td>
                  <td><button>Sửa</button><button>Xóa</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </form>
    </main>
    <script src="qlsv.js"></script>
  </body>
</html>
